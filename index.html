<!doctype html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vecinity - Marketplace Pilar</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --emerald: #047857; --emerald-light: #059669; --emerald-dark: #065f46;
            --black: #111; --white: #fafafa; --gray: #f3f4f6; --gray2: #e5e7eb; --gray3: #9ca3af; --gray4: #6b7280;
        }
        body { font-family: 'DM Sans', sans-serif; color: var(--black); background: var(--white); margin:0; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .emerald-gradient { background: linear-gradient(135deg, #047857 0%, #059669 50%, #10b981 100%); }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .hidden { display: none; }
        .toast { position: fixed; top: 20px; right: 20px; z-index: 999; padding: 12px 24px; border-radius: 12px; color: #fff; font-weight: 600; box-shadow: 0 10px 15px rgba(0,0,0,0.1); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .toast-success { background: var(--emerald); }
        .toast-error { background: #dc2626; }
        .pub-card { border: 1px solid var(--gray2); border-radius: 14px; overflow: hidden; background: white; transition: all 0.25s; }
        .pub-card:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.08); transform: translateY(-2px); }
        .search-input { background: white; border: 2px solid var(--gray2); border-radius: 12px; padding: 12px 16px 12px 44px; width: 100%; font-size: 15px; transition: all .2s; }
        .tab-btn { padding: 8px 16px; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all .2s; color: var(--gray4); }
        .tab-btn.active { background: var(--emerald); color: white; }
    </style>
</head>
<body class="h-full">
    <div id="toast-container"></div>

    <div class="app-wrapper" id="app">
        <header class="w-full bg-white border-b border-gray-100 sticky top-0 z-40 backdrop-blur-md">
            <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
                <div class="flex items-center gap-2 cursor-pointer" onclick="goHome()">
                    <div class="w-10 h-10 bg-[#047857] rounded-full flex items-center justify-center text-white"><i data-lucide="home" class="w-5 h-5"></i></div>
                    <span class="font-serif text-xl font-bold text-[#047857]">Vecinity</span>
                </div>
                <div class="flex items-center gap-2">
                    <div id="auth-buttons" class="flex gap-2">
                        <button onclick="showModal('modal-auth', 'register')" class="bg-[#047857] text-white px-4 py-2 rounded-full font-semibold text-sm">Unirme</button>
                        <button onclick="showModal('modal-auth', 'login')" class="border-2 border-[#047857] text-[#047857] px-4 py-2 rounded-full font-semibold text-sm">Ingresar</button>
                    </div>
                    <div id="user-menu" class="hidden items-center gap-2">
                        <button onclick="showModal('modal-publish')" class="bg-emerald-100 text-emerald-700 p-2 rounded-full hover:bg-emerald-200 transition-colors" title="Publicar algo">
                            <i data-lucide="plus-circle" class="w-6 h-6"></i>
                        </button>
                        <button onclick="showPage('page-portal')" class="bg-emerald-700 text-white px-3 py-2 rounded-full text-xs font-bold">Mi Portal</button>
                        <button onclick="logoutUser()" class="p-2 text-gray-400 hover:text-red-500"><i data-lucide="log-out" class="w-5 h-5"></i></button>
                    </div>
                </div>
            </div>
        </header>

        <div id="page-home" class="fade-in">
            <section class="emerald-gradient py-16 md:py-24 px-4 text-center text-white">
                <div class="max-w-3xl mx-auto">
                    <h1 class="font-serif text-3xl md:text-5xl font-bold mb-4">Soltá lo que no usás,<br>encontrá lo que necesitás</h1>
                    <p class="text-emerald-100 text-lg mb-8">Marketplace de Pilar · Tu comunidad vecinal</p>
                    <div class="max-w-xl mx-auto relative mb-6">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                        <input id="home-barrio-search" type="text" placeholder="Buscá tu barrio privado en Pilar..." class="search-input text-gray-800" oninput="filterBarrios(this.value)">
                        <div id="barrio-results" class="hidden absolute top-full left-0 right-0 mt-2 bg-white border border-gray-200 rounded-xl shadow-lg max-h-80 overflow-y-auto z-50 p-2 text-left text-gray-800"></div>
                    </div>
                    <button onclick="showPage('page-global-search')" class="bg-white/20 hover:bg-white/30 px-6 py-2 rounded-full font-semibold transition-all">Ver Marketplace Global</button>
                </div>
            </section>
            
            <section class="max-w-6xl mx-auto px-4 py-16">
                <h2 class="font-serif text-2xl md:text-3xl font-bold text-center mb-10">Categorías</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6" id="home-categories"></div>
            </section>
        </div>

        <div id="page-barrio" class="hidden min-h-screen bg-gray-50">
            <div class="bg-emerald-900 text-white py-16 px-6">
                <div class="max-w-6xl mx-auto">
                    <h2 id="barrio-title" class="font-serif text-4xl font-bold mb-4"></h2>
                    <p class="text-emerald-100 mb-6">Explorá lo que venden tus vecinos hoy.</p>
                    <button onclick="showModal('modal-publish')" class="bg-emerald-600 px-6 py-2 rounded-full font-bold text-sm hover:bg-emerald-500 transition-colors">Publicar en este barrio</button>
                </div>
            </div>
            <div id="barrio-marketplace" class="max-w-6xl mx-auto px-6 py-12 grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="page-portal" class="hidden min-h-screen bg-gray-50 p-6">
            <div id="perfil-info" class="max-w-xl mx-auto bg-white p-8 rounded-3xl shadow-sm mb-8 text-center"></div>
            <div class="max-w-6xl mx-auto flex justify-between items-center mb-6">
                <h3 class="font-serif text-2xl font-bold">Mis Publicaciones</h3>
                <button onclick="showModal('modal-publish')" class="bg-emerald-700 text-white px-4 py-2 rounded-full text-sm font-bold shadow-lg">+ Nuevo Anuncio</button>
            </div>
            <div id="my-pub-list" class="max-w-6xl mx-auto grid sm:grid-cols-2 gap-6"></div>
        </div>

        <div id="page-global-search" class="hidden min-h-screen bg-gray-50 p-6 text-center">
            <h2 class="font-serif text-3xl font-bold mb-8 max-w-6xl mx-auto">Marketplace Global</h2>
            <div id="global-pub-list" class="max-w-6xl mx-auto grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <div id="modal-auth" class="modal-overlay hidden" onclick="if(event.target===this)closeModal('modal-auth')">
        <div class="bg-white rounded-[32px] w-full max-w-md p-10 shadow-2xl relative">
            <div class="flex gap-4 mb-8 border-b border-gray-100">
                <button id="auth-tab-login" class="tab-btn active flex-1" onclick="switchAuthTab('login')">Ingresar</button>
                <button id="auth-tab-register" class="tab-btn flex-1" onclick="switchAuthTab('register')">Unirme</button>
            </div>
            <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4">
                <input id="login-email" type="text" placeholder="Email o Nick" required class="w-full bg-gray-50 rounded-xl px-4 py-3 outline-none">
                <input id="login-pass" type="password" placeholder="Contraseña" required class="w-full bg-gray-50 rounded-xl px-4 py-3 outline-none">
                <button type="submit" class="w-full bg-emerald-700 text-white py-3.5 rounded-xl font-bold">Entrar</button>
            </form>
            <form id="form-register" class="hidden space-y-3">
                <input id="reg-nombre" type="text" placeholder="Nombre" required class="w-full bg-gray-50 rounded-lg px-4 py-2">
                <input id="reg-nick" type="text" placeholder="Nick / Usuario" required class="w-full bg-gray-50 rounded-lg px-4 py-2">
                <input id="reg-whatsapp" type="tel" placeholder="WhatsApp (549...)" required class="w-full bg-gray-50 rounded-lg px-4 py-2">
                <input id="reg-email" type="email" placeholder="Email" required class="w-full bg-gray-50 rounded-lg px-4 py-2">
                <select id="reg-barrio" class="w-full bg-gray-50 rounded-lg px-4 py-2 font-bold text-gray-500"></select>
                <input id="reg-pass" type="password" placeholder="Contraseña" required class="w-full bg-gray-50 rounded-lg px-4 py-2">
                <button type="button" onclick="handleUserRegister()" class="w-full bg-emerald-700 text-white py-3 rounded-xl font-bold mt-4">Crear Cuenta</button>
            </form>
        </div>
    </div>

    <div id="modal-publish" class="modal-overlay hidden" onclick="if(event.target===this)closeModal('modal-publish')">
        <div class="bg-white rounded-[32px] w-full max-w-lg p-10 shadow-2xl">
            <h2 class="font-serif text-2xl font-bold mb-6">¿Qué querés vender hoy?</h2>
            <form onsubmit="handlePublish(event)" class="space-y-4">
                <input id="pub-title" type="text" placeholder="Título del producto" required class="w-full bg-gray-50 rounded-xl px-4 py-3 outline-none border-2 border-transparent focus:border-emerald-500">
                <textarea id="pub-desc" placeholder="Describí tu producto..." required class="w-full bg-gray-50 rounded-xl px-4 py-3 outline-none border-2 border-transparent focus:border-emerald-500" rows="3"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input id="pub-price" type="text" placeholder="Precio (ARS)" required class="w-full bg-gray-50 rounded-xl px-4 py-3 outline-none border-2 border-transparent focus:border-emerald-500">
                    <select id="pub-category" class="w-full bg-gray-50 rounded-xl px-4 py-3 font-bold text-gray-600 outline-none border-2 border-transparent focus:border-emerald-500">
                        <option value="Hogar">🏠 Hogar</option>
                        <option value="Comida">🍔 Comida</option>
                        <option value="Escolares">📚 Escolares</option>
                        <option value="Ropa">👕 Ropa</option>
                        <option value="Electrónica">💻 Electrónica</option>
                        <option value="Servicios">🔧 Servicios</option>
                    </select>
                </div>
                <div class="p-4 bg-gray-50 rounded-2xl">
                    <p class="text-xs font-bold text-gray-400 mb-3 uppercase">¿Quién puede verlo?</p>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 text-sm font-bold text-emerald-800"><input type="radio" name="pub-scope" value="barrio" checked> Solo mi barrio</label>
                        <label class="flex items-center gap-2 text-sm font-bold text-blue-800"><input type="radio" name="pub-scope" value="global"> Todo Pilar</label>
                    </div>
                </div>
                <button type="submit" id="btn-pub-submit" class="w-full bg-emerald-700 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-emerald-800 transition-all">Publicar Ahora</button>
            </form>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxoVIjMKDL9hl4k4YGNpY9UsPyP-Lh3KbuorKJO5Dg3zlcVO5H08Q9Boxzf58qJMmUpGA/exec'; // PEGA TU LINK ACÁ

        const BARRIOS = ["Acacias Blancas", "Alamos", "Altos de Pilar", "Aranjuez", "Ayres de Pilar", "Beverly Hills", "Boca Ratón", "Brisas de Pilar", "Campos de Álvarez", "Cardales Village", "Castaños de Pilar", "Chacras de Murray", "Club de Campo Los Lagartos", "Complejo Pilar", "Cruz del Sur", "Del Viso", "El Aljibe", "El Canton", "El Casco de Pilar", "El Establo (Haras del Pilar)", "El Jagüel", "Estancias del Pilar", "Fincas de Pilar", "Golfer's Country Club", "Greenlands", "Haras del Pilar - El Establo", "Haras del Pilar - La Caballeriza", "Haras del Pilar - La Pradera", "Highland Park", "La Delfina", "La Escondida", "La Lomada", "La Lonja", "La Peregrina", "La Reserva", "Lagos de Pilar", "Las Brisas", "Las Calandrias", "Las Liebres", "Los Pilares", "Mapuche", "Martindale", "Mayling", "Miraflores", "Nordelta", "Palmas de Pilar", "Pilar del Este - San Alfonso", "Pilar del Este - Santa Guadalupe", "Pilar del Este - San Ramiro", "Pilar del Lago", "Pilará", "San Sebastián", "Santa Bárbara", "Tortugas", "Villa Rosa"];

        let allData = [];
        let currentUser = null;
        let currentBarrio = null;

        async function init() {
            lucide.createIcons();
            populateBarrioSelect();
            renderHomeCategories();
            
            const saved = localStorage.getItem('vecinity_user');
            if(saved) { 
                currentUser = JSON.parse(saved); 
                updateAuthUI(); 
            }
            
            if(SCRIPT_URL && SCRIPT_URL.includes('exec')) {
                await loadData();
            }
        }

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                allData = await response.json();
                renderCurrentView();
            } catch (e) { console.error(e); }
        }

        function populateBarrioSelect() {
            const options = '<option value="" disabled selected>Elegí tu barrio...</option>' + 
                            BARRIOS.sort().map(b => `<option value="${b}">${b}</option>`).join('');
            document.getElementById('reg-barrio').innerHTML = options;
        }

        function pubCardHTML(p) {
            const waMsg = `Hola! Vi tu publicación "${p.pub_title || p.titulo}" en Vecinity...`;
            const waLink = `https://wa.me/54${p.whatsapp || p.pub_user_whatsapp}?text=${encodeURIComponent(waMsg)}`;
            const autor = p.nick || p.pub_user_nick || "Vecino";

            return `
                <div class="pub-card fade-in">
                    <div class="p-6">
                        <span class="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-[10px] font-bold uppercase mb-4 inline-block">
                            ${p.barrio || p.pub_barrio}
                        </span>
                        <h4 class="font-serif text-2xl font-bold mb-2 text-gray-900">${p.titulo || p.pub_title}</h4>
                        <p class="text-gray-500 text-sm mb-6">${p.descripcion || p.pub_description}</p>
                        <div class="flex items-center gap-2 mb-6 p-2 bg-gray-50 rounded-xl">
                            <div class="w-7 h-7 bg-emerald-700 rounded-full flex items-center justify-center text-white text-[10px] font-bold">${autor[0].toUpperCase()}</div>
                            <span class="text-xs font-bold text-gray-500">@${autor}</span>
                        </div>
                        <div class="flex justify-between items-center mt-auto border-t pt-5">
                            <span class="text-2xl font-black text-emerald-800">$${p.precio || p.pub_price || '0'}</span>
                            <a href="${waLink}" target="_blank" class="w-12 h-12 rounded-2xl bg-emerald-700 flex items-center justify-center text-white shadow-lg hover:bg-emerald-800 transition-all hover:scale-105">
                                <i data-lucide="message-circle" class="w-6 h-6"></i>
                            </a>
                        </div>
                    </div>
                </div>`;
        }

        async function handleUserRegister() {
            const data = { type: 'user', nombre: document.getElementById('reg-nombre').value, nick: document.getElementById('reg-nick').value, email: document.getElementById('reg-email').value, barrio: document.getElementById('reg-barrio').value, whatsapp: document.getElementById('reg-whatsapp').value, password: document.getElementById('reg-pass').value };
            await sendToGoogle(data);
            toast("¡Registro exitoso! Ya podés ingresar.");
            closeModal('modal-auth');
            setTimeout(() => location.reload(), 1500);
        }

        async function handlePublish(e) {
            e.preventDefault();
            if(!currentUser) return toast("Debés ingresar para publicar", "error");
            
            const btn = document.getElementById('btn-pub-submit');
            btn.disabled = true; btn.innerText = "Publicando...";

            const data = { 
                type: 'publication', 
                pub_title: document.getElementById('pub-title').value, 
                pub_description: document.getElementById('pub-desc').value, 
                pub_price: document.getElementById('pub-price').value, 
                pub_category: document.getElementById('pub-category').value, 
                pub_barrio: currentUser.barrio, 
                pub_user_nick: currentUser.nick, 
                pub_user_whatsapp: currentUser.whatsapp, 
                pub_scope: document.querySelector('input[name="pub-scope"]:checked').value 
            };
            
            await sendToGoogle(data);
            toast("¡Anuncio subido con éxito!");
            closeModal('modal-publish');
            setTimeout(() => location.reload(), 2000);
        }

        async function sendToGoogle(o) { 
            try { await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(o) }); return true; } catch(e){ return false; } 
        }

        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('login-email').value.trim();
            const p = document.getElementById('login-pass').value;
            const found = allData.find(x => (x.email === u || x.nick === u) && x.password === p);
            if(found) { currentUser = found; localStorage.setItem('vecinity_user', JSON.stringify(found)); closeModal('modal-auth'); updateAuthUI(); renderCurrentView(); toast("Hola " + found.nombre); } else { toast("Usuario o clave incorrectos", "error"); }
        }

        function filterBarrios(q) {
            const res = document.getElementById('barrio-results');
            if(!q) return res.classList.add('hidden');
            const matches = BARRIOS.filter(b => b.toLowerCase().includes(q.toLowerCase())).slice(0,6);
            res.innerHTML = matches.map(m => `<div class="p-4 hover:bg-emerald-50 cursor-pointer font-bold text-emerald-900 rounded-xl" onclick="enterBarrio('${m}')">${m}</div>`).join('');
            res.classList.remove('hidden');
        }

        function enterBarrio(b) { currentBarrio = b; showPage('page-barrio'); }

        function renderCurrentView() {
            if(!document.getElementById('page-barrio').classList.contains('hidden')) renderBarrioPortal();
            if(!document.getElementById('page-portal').classList.contains('hidden')) renderUserPortal();
            if(!document.getElementById('page-global-search').classList.contains('hidden')) renderGlobalSearch();
            updateAuthUI();
            lucide.createIcons();
        }

        function renderBarrioPortal() {
            document.getElementById('barrio-title').textContent = currentBarrio;
            const pubs = allData.filter(p => (p.type === 'publication' || p.pub_title) && (p.pub_barrio === currentBarrio || p.barrio === currentBarrio));
            document.getElementById('barrio-marketplace').innerHTML = pubs.length ? pubs.map(pubCardHTML).join('') : '<p class="col-span-full text-center py-20 text-gray-400 font-serif">No hay anuncios aún en este barrio.</p>';
        }

        function renderGlobalSearch() {
            const pubs = allData.filter(p => (p.type === 'publication' || p.pub_title) && p.pub_scope === 'global');
            document.getElementById('global-pub-list').innerHTML = pubs.length ? pubs.map(pubCardHTML).join('') : '<p class="col-span-full text-center py-20 text-gray-400">No hay anuncios globales.</p>';
        }

        function renderUserPortal() {
            document.getElementById('perfil-info').innerHTML = `<div class="w-20 h-20 bg-emerald-700 rounded-full flex items-center justify-center text-white text-3xl font-bold mx-auto mb-4">${currentUser.nombre[0]}</div><h3 class="text-3xl font-bold">${currentUser.nombre}</h3><p class="text-emerald-700 font-bold">@${currentUser.nick} · ${currentUser.barrio}</p>`;
            const myPubs = allData.filter(p => p.pub_user_nick === currentUser.nick);
            document.getElementById('my-pub-list').innerHTML = myPubs.map(pubCardHTML).join('');
        }

        function renderHomeCategories() {
            const cats = [{i:'🏠',l:'Hogar'},{i:'🍔',l:'Comida'},{i:'📚',l:'Escolares'},{i:'🔧',l:'Servicios'}];
            document.getElementById('home-categories').innerHTML = cats.map(c => `<div class="bg-white p-8 rounded-[32px] border border-gray-100 text-center cursor-pointer hover:shadow-lg transition" onclick="showPage('page-global-search')"><span class="text-4xl block mb-2">${c.i}</span><p class="font-bold text-gray-800 text-sm">${c.l}</p></div>`).join('');
        }

        function updateAuthUI() { 
            if(currentUser) { 
                document.getElementById('auth-buttons').classList.add('hidden'); 
                document.getElementById('user-menu').classList.remove('hidden'); 
                document.getElementById('user-menu').classList.add('flex'); 
                document.getElementById('user-greeting').textContent = "Hola, " + currentUser.nombre; 
            } 
        }

        function showPage(id) { ['page-home','page-barrio','page-portal','page-global-search'].forEach(p => document.getElementById(p).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); window.scrollTo(0,0); renderCurrentView(); }
        function goHome() { showPage('page-home'); }
        function showModal(id, tab) { document.getElementById(id).classList.remove('hidden'); if(tab) switchAuthTab(tab); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function switchAuthTab(t) { document.getElementById('form-login').classList.toggle('hidden', t==='register'); document.getElementById('form-register').classList.toggle('hidden', t==='login'); document.getElementById('auth-tab-login').classList.toggle('active', t==='login'); document.getElementById('auth-tab-register').classList.toggle('active', t==='register'); }
        function toast(m, t="success") { const d = document.createElement('div'); d.className = `toast toast-${t}`; d.innerText = m; document.getElementById('toast-container').appendChild(d); setTimeout(() => d.remove(), 4000); }
        function logoutUser() { localStorage.removeItem('vecinity_user'); location.reload(); }
        
        window.onload = init;
    </script>
</body>
</html>
