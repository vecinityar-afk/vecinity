<!doctype html>
<html lang="es" class="h-full">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Vecinity - Marketplace Pilar</title>

 <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxoVIjMKDL9hl4k4YGNpY9UsPyP-Lh3KbuorKJO5Dg3zlcVO5H08Q9Boxzf58qJMmUpGA/exec'; 
 </script>

 <script src="https://cdn.tailwindcss.com/3.4.17"></script>
 <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
 <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
 <style>
:root{--emerald:#047857;--emerald-light:#059669;--emerald-dark:#065f46;--black:#111;--white:#fafafa;--gray:#f3f4f6;--gray2:#e5e7eb;--gray3:#9ca3af;--gray4:#6b7280}
body{font-family:'DM Sans',sans-serif;color:var(--black);background:var(--white);margin:0}
.font-serif{font-family:'Playfair Display',serif}
.app-wrapper{width:100%;height:100vh;overflow-y:auto;overflow-x:hidden}
.emerald-gradient{background:linear-gradient(135deg,#047857 0%,#059669 50%,#10b981 100%)}
.fade-in{animation:fadeIn .4s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.hidden{display:none}
.badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase}
.toast{position:fixed;top:20px;right:20px;z-index:999;padding:12px 24px;border-radius:12px;color:#fff;font-weight:600;box-shadow:0 10px 15px rgba(0,0,0,0.1);animation:slideIn 0.3s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.toast-success{background:var(--emerald)}
.toast-error{background:#dc2626}
.pub-card{border:1px solid var(--gray2);border-radius:16px;background:white;transition:0.3s}
.pub-card:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,0.08)}
.tab-btn{padding:8px 16px;border-radius:10px;font-weight:600;cursor:pointer;color:var(--gray4)}
.tab-btn.active{background:var(--emerald);color:white}
.search-input{background:white;border:2px solid var(--gray2);border-radius:14px;padding:12px 16px 12px 48px;width:100%}
.search-input:focus{border-color:var(--emerald);outline:none}
.star{cursor:pointer;font-size:24px}
</style>
</head>
<body class="h-full">
 <div id="toast-container"></div>
 <div class="app-wrapper" id="app">

  <header class="w-full bg-white/95 border-b border-gray-100 sticky top-0 z-50 backdrop-blur-md">
   <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2 cursor-pointer" onclick="goHome()">
     <div class="w-10 h-10 bg-[#047857] rounded-full flex items-center justify-center text-white"><i data-lucide="home" class="w-5 h-5"></i></div>
     <span class="font-serif text-2xl font-bold text-[#047857]">Vecinity</span>
    </div>
    <div class="flex items-center gap-3">
     <div id="auth-buttons" class="flex gap-2">
      <button onclick="showModal('modal-auth', 'register')" class="bg-[#047857] text-white px-5 py-2 rounded-full font-bold text-sm">Unirme</button>
      <button onclick="showModal('modal-auth', 'login')" class="border-2 border-[#047857] text-[#047857] px-5 py-2 rounded-full font-bold text-sm">Entrar</button>
     </div>
     <div id="user-menu" class="hidden items-center gap-3">
      <button onclick="showModal('modal-publish')" class="bg-emerald-100 text-emerald-700 p-2 rounded-full"><i data-lucide="plus" class="w-5 h-5"></i></button>
      <button onclick="showPage('page-portal')" class="bg-emerald-700 text-white px-4 py-2 rounded-full text-xs font-black">Mi Portal</button>
      <button onclick="logoutUser()" class="text-gray-400 hover:text-red-500"><i data-lucide="log-out" class="w-5 h-5"></i></button>
     </div>
    </div>
   </div>
  </header>

  <div id="page-home" class="fade-in">
   <section class="emerald-gradient py-20 px-4 text-center text-white">
    <div class="max-w-3xl mx-auto">
     <h1 class="font-serif text-4xl md:text-6xl font-bold mb-6">Soltá lo que no usás,<br> encontrá lo que necesitás</h1>
     <div class="max-w-xl mx-auto relative">
      <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5"></i>
      <input id="home-barrio-search" type="text" placeholder="Buscá tu barrio privado..." class="search-input text-gray-800" oninput="filterBarrios(this.value)">
      <div id="barrio-results" class="hidden absolute top-full left-0 right-0 mt-2 bg-white border border-gray-200 rounded-2xl shadow-2xl max-h-80 overflow-y-auto z-50 p-2 text-left text-gray-800"></div>
     </div>
    </div>
   </section>
   <section class="max-w-6xl mx-auto px-4 py-16">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6" id="home-categories"></div>
   </section>
  </div>

  <div id="page-barrio" class="hidden min-h-screen bg-gray-50">
   <div class="bg-emerald-900 text-white py-12 px-6 text-center">
    <h2 id="barrio-title" class="font-serif text-5xl font-bold mb-6"></h2>
    <div class="flex justify-center gap-2 overflow-x-auto pb-4">
     <button class="tab-btn active" onclick="switchBarrioTab(this,'barrio-marketplace')">Marketplace</button>
     <button class="tab-btn" onclick="switchBarrioTab(this,'barrio-mascotas')">Mascotas</button>
     <button class="tab-btn" onclick="switchBarrioTab(this,'barrio-servicios')">Servicios</button>
    </div>
   </div>
   <div class="max-w-6xl mx-auto px-6 py-12">
    <div id="barrio-marketplace" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    <div id="barrio-mascotas" class="hidden grid sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    <div id="barrio-servicios" class="hidden grid sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
   </div>
  </div>

  <div id="page-portal" class="hidden min-h-screen bg-gray-50 p-6">
   <div id="perfil-info" class="max-w-xl mx-auto bg-white p-8 rounded-3xl shadow-sm mb-12 text-center"></div>
   <div id="my-pub-list" class="max-w-6xl mx-auto grid sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
  </div>

  <div id="modal-auth" class="modal-overlay hidden" onclick="if(event.target===this)closeModal('modal-auth')">
   <div class="bg-white rounded-[40px] w-full max-w-md p-10 shadow-2xl">
    <div class="flex gap-4 mb-8">
     <button id="auth-tab-login" class="tab-btn active flex-1" onclick="switchAuthTab('login')">Ingresar</button>
     <button id="auth-tab-register" class="tab-btn flex-1" onclick="switchAuthTab('register')">Unirme</button>
    </div>
    <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4">
     <input id="login-email" type="text" placeholder="Email o Nick" required class="w-full bg-gray-50 rounded-xl px-4 py-3 outline-none">
     <input id="login-pass" type="password" placeholder="Contraseña" required class="w-full bg-gray-50 rounded-xl px-4 py-3 outline-none">
     <button type="submit" class="w-full bg-emerald-700 text-white py-4 rounded-xl font-bold">Entrar</button>
    </form>
    <form id="form-register" class="hidden space-y-3">
     <input id="reg-nombre" type="text" placeholder="Nombre" required class="w-full bg-gray-50 rounded-lg px-4 py-2">
     <input id="reg-nick" type="text" placeholder="Nick" required class="w-full bg-gray-50 rounded-lg px-4 py-2">
     <input id="reg-whatsapp" type="tel" placeholder="WhatsApp (Ej: 54911...)" required class="w-full bg-gray-50 rounded-lg px-4 py-2">
     <input id="reg-email" type="email" placeholder="Email" required class="w-full bg-gray-50 rounded-lg px-4 py-2">
     <select id="reg-barrio" required class="w-full bg-gray-50 rounded-lg px-4 py-2 font-bold text-gray-500 outline-none"></select>
     <input id="reg-pass" type="password" placeholder="Contraseña" required class="w-full bg-gray-50 rounded-lg px-4 py-2">
     <button type="button" onclick="handleUserRegister()" class="w-full bg-emerald-700 text-white py-4 rounded-xl font-bold mt-4">Crear Cuenta</button>
    </form>
   </div>
  </div>

  <div id="modal-publish" class="modal-overlay hidden" onclick="if(event.target===this)closeModal('modal-publish')">
   <div class="bg-white rounded-[32px] w-full max-w-lg p-10 shadow-2xl">
    <h2 class="font-serif text-2xl font-bold mb-6">Nueva Publicación</h2>
    <form onsubmit="handlePublish(event)" class="space-y-4">
     <select id="pub-section" required class="w-full bg-gray-50 rounded-xl px-4 py-3 outline-none" onchange="togglePubFields()">
      <option value="marketplace">Marketplace</option>
      <option value="mascotas">Mascotas</option>
      <option value="servicios">Servicios</option>
     </select>
     <input id="pub-title" type="text" placeholder="Título" required class="w-full bg-gray-50 rounded-xl px-4 py-3 outline-none">
     <textarea id="pub-desc" placeholder="Descripción..." required class="w-full bg-gray-50 rounded-xl px-4 py-3 outline-none" rows="3"></textarea>
     <div id="mkt-fields" class="grid grid-cols-2 gap-4">
      <input id="pub-price" type="text" placeholder="Precio (ARS)" class="bg-gray-50 rounded-xl px-4 py-3 outline-none">
      <select id="pub-category" class="bg-gray-50 rounded-xl px-4 py-3 outline-none">
       <option value="Hogar">Hogar</option><option value="Comida">Comida</option><option value="Otros">Otros</option>
      </select>
     </div>
     <button type="submit" class="w-full bg-emerald-700 text-white py-4 rounded-xl font-bold">Publicar Ahora</button>
    </form>
   </div>
  </div>

 </div>

 <script>
const BARRIOS = ["Ayres de Pilar","Acacias Blancas","Aranjuez","Beverly Hills","Boca Ratón","Brisas de Pilar","Campos de Álvarez","Cardales Village","Castaños de Pilar","Chacras de Murray","Club de Campo Los Lagartos","Cruz del Sur","Del Viso","El Aljibe","El Canton","El Jagüel","Estancias del Pilar","Fincas de Pilar","Golfer's Country Club","Greenlands","Haras del Pilar La Caballeriza","Haras del Pilar El Establo","Haras del Pilar La Pradera","Highland Park","La Delfina","La Escondida","La Lonja","La Peregrina","La Reserva","Lagos de Pilar","Las Calandrias","Las Liebres","Los Pilares","Mapuche","Martindale","Mayling","Miraflores","Nordelta","Palmas de Pilar","Pilar del Este","Pilar del Lago","Pilará","San Sebastián","Santa Bárbara","Santa Guadalupe","Santa María de los Olivos","Tortugas","Villa Rosa","La Lomada"];

let allData = [];
let currentUser = null;
let currentBarrio = null;

async function init() {
    lucide.createIcons();
    populateBarrioSelect(); // <--- SE CARGAN AL INICIO
    renderHomeCategories();
    restoreSession();
    if(SCRIPT_URL && SCRIPT_URL.includes('exec')) await loadData();
}

async function loadData() {
    try {
        const response = await fetch(SCRIPT_URL);
        allData = await response.json();
        renderCurrentView();
    } catch (e) { console.error(e); }
}

function populateBarrioSelect() {
    const sel = document.getElementById('reg-barrio');
    if(!sel) return;
    const items = BARRIOS.sort().map(b => `<option value="${b}">${b}</option>`).join('');
    sel.innerHTML = '<option value="" disabled selected>Elegí tu barrio...</option>' + items;
}

function pubCardHTML(p) {
    const waLink = `https://wa.me/54${p.whatsapp || p.pub_user_whatsapp}`;
    const autor = p.nick || p.pub_user_nick || "Vecino";
    return `<div class="pub-card"><div class="p-6"><h4 class="font-serif text-2xl font-bold mb-2">${p.pub_title || p.titulo}</h4><p class="text-gray-500 text-sm mb-6">${p.pub_description || p.descripcion}</p><div class="flex justify-between items-center border-t pt-5"><span class="text-2xl font-black text-emerald-800">$${p.pub_price || p.precio || '0'}</span><a href="${waLink}" target="_blank" class="w-12 h-12 rounded-2xl bg-emerald-700 flex items-center justify-center text-white"><i data-lucide="message-circle" class="w-6 h-6"></i></a></div></div></div>`;
}

async function handleUserRegister() {
    const data = { type: 'user', nombre: document.getElementById('reg-nombre').value, nick: document.getElementById('reg-nick').value, email: document.getElementById('reg-email').value, barrio: document.getElementById('reg-barrio').value, whatsapp: document.getElementById('reg-whatsapp').value, password: document.getElementById('reg-pass').value };
    await sendToGoogle(data);
    toast("¡Registro exitoso!");
    location.reload();
}

async function handlePublish(e) {
    e.preventDefault();
    const data = { type: 'publication', pub_title: document.getElementById('pub-title').value, pub_description: document.getElementById('pub-desc').value, pub_price: document.getElementById('pub-price').value || "0", pub_section: document.getElementById('pub-section').value, pub_barrio: currentUser.barrio, pub_user_nick: currentUser.nick, pub_user_whatsapp: currentUser.whatsapp, pub_scope: "global" };
    await sendToGoogle(data);
    toast("¡Publicado!");
    location.reload();
}

async function sendToGoogle(o) { try { await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(o) }); return true; } catch(e){ return false; } }

function handleLogin(e) {
    e.preventDefault();
    const u = document.getElementById('login-email').value.trim();
    const p = document.getElementById('login-pass').value;
    const found = allData.find(x => x.type === 'user' && (x.email === u || x.nick === u) && x.password === p);
    if(found) { currentUser = found; localStorage.setItem('vecinity_user', JSON.stringify(found)); location.reload(); } else { toast("Error en datos", "error"); }
}

function filterBarrios(q) {
    const res = document.getElementById('barrio-results');
    if(!q) return res.classList.add('hidden');
    const matches = BARRIOS.filter(b => b.toLowerCase().includes(q.toLowerCase())).slice(0,6);
    res.innerHTML = matches.map(m => `<div class="p-4 hover:bg-emerald-50 cursor-pointer font-bold" onclick="enterBarrio('${m}')">${m}</div>`).join('');
    res.classList.remove('hidden');
}

function enterBarrio(b) { currentBarrio = b; showPage('page-barrio'); }

function renderCurrentView() {
    if(!document.getElementById('page-barrio').classList.contains('hidden')) renderBarrioPortal();
    if(!document.getElementById('page-portal').classList.contains('hidden')) renderUserPortal();
    updateAuthUI(); lucide.createIcons();
}

function renderBarrioPortal() {
    document.getElementById('barrio-title').textContent = currentBarrio;
    const pubs = allData.filter(p => p.type === 'publication' && (p.pub_barrio === currentBarrio || p.barrio === currentBarrio));
    document.getElementById('barrio-marketplace').innerHTML = pubs.filter(p => p.pub_section === 'marketplace').map(pubCardHTML).join('') || '<p class="col-span-full py-10">Sin anuncios.</p>';
}

function renderUserPortal() {
    document.getElementById('perfil-info').innerHTML = `<h3 class="text-3xl font-bold">${currentUser.nombre}</h3><p>@${currentUser.nick} · ${currentUser.barrio}</p>`;
}

function renderHomeCategories() {
    const cats = [{i:'🏠',l:'Hogar'},{i:'🍔',l:'Comida'},{i:'📚',l:'Escolares'},{i:'🔧',l:'Servicios'}];
    document.getElementById('home-categories').innerHTML = cats.map(c => `<div class="bg-white p-8 rounded-[32px] border text-center cursor-pointer hover:shadow-lg" onclick="showPage('page-barrio')"><span class="text-4xl block mb-2">${c.i}</span><p class="font-bold">${c.l}</p></div>`).join('');
}

function updateAuthUI() { if(currentUser) { document.getElementById('auth-buttons').classList.add('hidden'); document.getElementById('user-menu').classList.remove('hidden'); document.getElementById('user-menu').classList.add('flex'); } }
function showPage(id) { ['page-home','page-barrio','page-portal'].forEach(p => document.getElementById(p).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); renderCurrentView(); }
function goHome() { showPage('page-home'); }
function showModal(id, tab) { document.getElementById(id).classList.remove('hidden'); if(tab) switchAuthTab(tab); populateBarrioSelect(); } // <--- TAMBIÉN AL ABRIR MODAL
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
function switchAuthTab(t) { document.getElementById('form-login').classList.toggle('hidden', t==='register'); document.getElementById('form-register').classList.toggle('hidden', t==='login'); }
function switchBarrioTab(btn, tabId) { ['barrio-marketplace','barrio-mascotas','barrio-servicios'].forEach(id => document.getElementById(id).classList.add('hidden')); document.getElementById(tabId).classList.remove('hidden'); btn.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
function togglePubFields() { const s = document.getElementById('pub-section').value; document.getElementById('mkt-fields').classList.toggle('hidden', s !== 'marketplace'); }
function toast(m, t="success") { const d = document.createElement('div'); d.className = `toast toast-${t}`; d.innerText = m; document.getElementById('toast-container').appendChild(d); setTimeout(() => d.remove(), 4000); }
function restoreSession() { const saved = localStorage.getItem('vecinity_user'); if(saved) { currentUser = JSON.parse(saved); updateAuthUI(); } }
function logoutUser() { localStorage.removeItem('vecinity_user'); location.reload(); }

window.onload = init;
 </script>
</body>
</html>
